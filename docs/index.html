<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 50px;
            font-size: 3em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            transform: translateY(0);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .game-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        .game-card h2 {
            color: white;
            margin-bottom: 15px;
            font-size: 1.8em;
        }

        .game-card p {
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .game-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .play-btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .play-btn:active {
            transform: scale(0.98);
        }

        footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 50px;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
                margin-bottom: 30px;
            }

            .games-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .game-card {
                padding: 20px;
            }

            .game-card h2 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 游戏中心</h1>
        
        <div class="games-grid">
            <!-- 乒乓球游戏 -->
            <div class="game-card">
                <div class="game-icon">🏓</div>
                <h2>乒乓球游戏</h2>
                <p>经典的双人乒乓球游戏。用鼠标或方向键控制左侧拨片，与电脑对战。</p>
                <a href="pong-game/" class="play-btn">开始游戏</a>
            </div>

            <!-- FPS游戏 -->
            <div class="game-card">
                <div class="game-icon">🎯</div>
                <h2>FPS 射击游戏</h2>
                <p>第一人称射击游戏。使用WASD移动，鼠标瞄准，左键射击敌人。</p>
                <a href="fps-game/" class="play-btn">开始游戏</a>
            </div>
        </div>

        <footer>
            <p>✨ 享受游戏！按 Esc 键可以返回菜单</p>
        </footer>
    </div>
</body>
</html>
